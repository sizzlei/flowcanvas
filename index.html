<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowCanvas — 비주얼 다이어그램 에디터</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>Flow<span class="tag">Canvas</span></h1></div>

    <section class="tbar-grp">
      <span class="grp-cap">도형</span>
      <div class="grp-row" id="palette">
        <button class="shape-btn" data-shape="round" title="둥근 사각형">
          <svg viewBox="0 0 26 22"><rect x="2" y="4" width="22" height="14" rx="7"/></svg></button>
        <button class="shape-btn" data-shape="rect" title="사각형(처리)">
          <svg viewBox="0 0 26 22"><rect x="2" y="4" width="22" height="14"/></svg></button>
        <button class="shape-btn" data-shape="stadium" title="스타디움(시작/끝)">
          <svg viewBox="0 0 26 22"><rect x="2" y="5" width="22" height="12" rx="6"/></svg></button>
        <button class="shape-btn" data-shape="diamond" title="마름모(판단)">
          <svg viewBox="0 0 26 22"><polygon points="13,3 24,11 13,19 2,11"/></svg></button>
        <button class="shape-btn" data-shape="circle" title="원">
          <svg viewBox="0 0 26 22"><circle cx="13" cy="11" r="8"/></svg></button>
        <button class="shape-btn" data-shape="hexagon" title="육각형">
          <svg viewBox="0 0 26 22"><polygon points="7,3 19,3 24,11 19,19 7,19 2,11"/></svg></button>
        <button class="shape-btn" data-shape="cylinder" title="원통(DB)">
          <svg viewBox="0 0 26 22"><path d="M5 6 a8 3 0 0 1 16 0 v10 a8 3 0 0 1 -16 0 z"/></svg></button>
        <button class="shape-btn" data-shape="subroutine" title="서브루틴">
          <svg viewBox="0 0 26 22"><rect x="2" y="5" width="22" height="12"/><line x1="6" y1="5" x2="6" y2="17"/><line x1="20" y1="5" x2="20" y2="17"/></svg></button>
      </div>
    </section>

    <section class="tbar-grp">
      <span class="grp-cap">편집</span>
      <div class="grp-row">
        <button id="undoBtn" title="실행취소">↶</button>
        <button id="redoBtn" title="다시실행">↷</button>
        <button id="delBtn" class="danger" title="삭제">🗑</button>
        <button id="curveBtn" title="곡선/직선 화살표">⤳ 곡선</button>
        <button id="snapBtn" title="격자 스냅 (드래그·방향키 이동 시 격자에 맞춤)">⊞ 격자</button>
        <button id="contBtn" title="컨테이너 추가 (VPC/Region/Subnet 등)">▭ 컨테이너</button>
      </div>
    </section>

    <section class="tbar-grp">
      <span class="grp-cap">애니메이션</span>
      <div class="grp-row">
        <button id="playBtn" title="흐름선 애니메이션 재생/정지">▶ 재생</button>
        <button id="loopBtn" title="반복 재생 켜기/끄기">🔁 반복</button>
        <button id="orderBtn" title="흐름선 순서 번호 표시/숨김">① 순서</button>
        <span class="mini">색</span>
        <input type="color" id="animPick" value="#e879f9" title="애니메이션(흐름 펄스) 색 — 모든 흐름선 공통">
      </div>
    </section>

    <section class="tbar-grp">
      <span class="grp-cap">보기</span>
      <div class="grp-row">
        <button id="zoomOut" title="축소">−</button>
        <button id="zoomLevel" title="100%로 재설정">100%</button>
        <button id="zoomIn" title="확대">＋</button>
        <button id="fitBtn" title="화면 맞춤">⤢ 맞춤</button>
        <button id="bgBtn" class="theme-toggle" title="배경 다크/라이트 전환" aria-label="배경 다크/라이트 전환"><span class="tt-knob"></span></button>
      </div>
    </section>

    <section class="tbar-grp">
      <span class="grp-cap">파일</span>
      <div class="grp-row">
        <button id="fileMenuBtn" title="메뉴 (저장·열기·내보내기·설정·가이드)">☰ 메뉴 ▾</button>
      </div>
    </section>
    <input type="file" id="fileInput" accept=".yaml,.yml,text/yaml,application/json,.json" style="display:none">
    <input type="file" id="iconInput" accept=".svg,.png,image/svg+xml,image/png" multiple style="display:none">
    <!-- hidden color inputs, opened by the right-click menu's "직접…" items -->
    <div id="hidden-controls" style="display:none">
      <input type="color" id="colorPick" value="#8b5cf6">
      <input type="color" id="strokePick" value="#8b5cf6">
      <input type="color" id="groupColorPick" value="#8b5cf6">
    </div>
  </header>
  <main>
    <aside id="iconPanel">
      <div class="ip-head">
        <span>아이콘</span>
        <span class="ip-actions">
          <button id="iconImport" title="SVG/PNG 가져오기 (AWS 등)">＋</button>
          <button id="iconCollapse" title="패널 접기">◀</button>
        </span>
      </div>
      <input type="text" id="iconSearch" placeholder="전체 검색…">
      <select id="iconCat" title="분류 선택 (검색 중에는 전체에서 찾습니다)"></select>
      <div id="iconGrid" class="icon-grid"></div>
      <div class="ip-hint">클릭 = 가운데 추가 · 드래그 = 원하는 위치<br>가져온 아이콘 우클릭 = 삭제</div>
    </aside>
    <div id="canvasWrap">
      <div id="emptyHint">
        위 <b>도형 아이콘을 캔버스로 드래그</b>해 노드를 놓으세요<br>
        노드에 마우스를 올리면 나오는 <b>초록 점</b>을 드래그해 연결하세요<br>
        <b>스페이스 + 드래그</b>로 화면 이동 · <b>휠</b>로 확대/축소
      </div>
      <svg id="svg">
        <g id="edges"></g>
        <path id="tempEdge" style="display:none"></path>
        <g id="nodes"></g>
      </svg>
      <div id="inlineEditor"><div class="box">
        <input type="text" id="inlineInput" placeholder="텍스트 입력">
        <button class="ok" id="inlineOk">확인</button>
      </div></div>
      <div id="tagBar"></div>
      <button id="iconShow" title="아이콘 패널 열기"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="4.5" width="7" height="6.2" rx="1.4"/><rect x="3" y="13.3" width="7" height="6.2" rx="1.4"/><path d="M14.5 8.5l3.5 3.5-3.5 3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </main>
</div>
<div id="settingsModal">
  <div class="modal-box">
    <h3>⚙ 단축키 설정</h3>
    <p class="modal-sub">항목을 클릭한 뒤 원하는 키를 누르세요. 설정은 자동 저장되어 다시 열어도 유지됩니다.</p>
    <div id="keyList"></div>
    <div class="modal-actions">
      <button id="keyReset">기본값 복원</button>
      <button id="keyClose" class="primary">완료</button>
    </div>
  </div>
</div>
<div id="guideModal">
  <div class="modal-box guide-modal">
    <div class="guide-head"><h3>❓ FlowCanvas 사용자 가이드</h3>
      <button id="guideClose" class="primary">닫기</button></div>
    <div id="guideBody" class="guide-body"></div>
  </div>
</div>
<div id="ctxmenu"></div>
<div id="dialog">
  <div class="dialog-box">
    <p id="dialogMsg"></p>
    <input type="text" id="dialogInput" style="display:none">
    <div class="dialog-actions">
      <button id="dialogCancel">취소</button>
      <button id="dialogOk" class="primary">확인</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="aws-icons.js"></script>
<script src="guide.js"></script>
<script src="gif.js"></script>
<script src="app.js"></script>
</body>
</html>
